# Curated external resources for the Courses and Resources page
# (docs/learning/index.md). Rendered at build time by scripts/render_data.py
# as thumbnail cards at render:learning-resources:<section> markers; the
# build fails if the page's markers and this file's sections do not place
# every entry exactly once. Edit this file only; never the page.
#
# Thumbnails: YouTube entries derive their thumbnail from the video id;
# other entries carry the page's own og:image URL, verified live at
# authoring time (2026-06-11); entries without one render as text cards.
# kind + source build the card's meta line.

- title: Google AI Essentials
  section: getting_started
  source: Google
  kind: self-paced course
  url: https://grow.google/ai-essentials/
  thumbnail: https://www.gstatic.com/marketing-cms/assets/images/21/31/12172c2d442f9c678f910c1e0f08/christian-aie-1376x1376.webp=s1440-fcrop64=1,000041ddffffbe53-rw
  blurb: A short course on using AI tools productively and responsibly at work. No technical background required.

