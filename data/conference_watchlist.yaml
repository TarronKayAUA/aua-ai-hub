# Watchlist for the conference-watch workflow: recurring events not yet
# (or not currently) in data/conferences.yaml whose official pages are
# checked for newly announced editions. Owner-owned; the workflow only
# reads this file, and watchlist findings are always proposed in a GitHub
# issue, never applied. (Auto-apply exists only for events already in the
# calendar; see the conference_watch block in feeds.yaml.)
#
# Candidates follow the calendar's selection criteria (see the header of
# data/conferences.yaml): medical AI and medical education first, higher
# education second, general education third; English-language only.
#
# All URLs verified fetchable 2026-06-10. amia.org was considered and dropped
# because it blocks scripted requests (HTTP 403).

- name: Stanford Health AI Week (incl. AIMI Symposium)
  url: https://aimi.stanford.edu/stanford-health-ai-week
  note: Annual, early June. Includes the AIMI Symposium and Academic x Industry Summit.

- name: RAISE Health Symposium (Stanford Medicine)
  url: https://med.stanford.edu/content/sm/raisehealth/events/healthaiweek.html
  note: Part of Stanford Health AI Week.

