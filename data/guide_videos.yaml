# Curated setup and walkthrough videos for the technical guide pages.
# Rendered at build time by scripts/render_data.py as thumbnail cards.
# Placement: entries with group "local" render together at the
# render:guide-videos:local marker in docs/tools/local.md; entries with
# group "agents" render individually at per-tool markers in
# docs/tools/agents.md (render:guide-videos:agents:<slug>), and the build
# fails if the page's markers and this file's agent slugs do not match
# one to one. Edit this file only; never the pages.
#
# Every entry is verified before commit (video live, channel and title
# confirmed via YouTube's oEmbed API, duration and upload date from the
# watch page). Thumbnails derive from the video id; nothing is embedded.
# Tutorials age quickly: prefer official-channel videos where they exist,
# keep one entry per tool, refresh entries when a tool's interface
# changes. published is a display string.

