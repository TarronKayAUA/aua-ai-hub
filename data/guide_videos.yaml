# Curated setup and walkthrough videos for the technical guide pages.
# Rendered at build time by scripts/render_data.py into the page matching
# each entry's group: "agents" renders in docs/tools/agents.md, "local"
# renders in docs/tools/local.md. Edit this file only; never the pages.
#
# Every entry is verified before commit (video live, channel and title
# confirmed via YouTube's oEmbed API, duration and upload date from the
# watch page). Tutorials age quickly: prefer official-channel videos where
# they exist, keep one entry per tool, and refresh entries when a tool's
# interface changes. published is a display string.

