# Recommended tools directory. Rendered into docs/tools/index.md at build time
# by scripts/render_data.py. Edit this file only; never the rendered page.
#
# governance_status values: approved | conditional | restricted | under_review
# All statuses are provisional until the AI Committee ratifies them.
# Only the owner changes governance_status.
#
# Content-watch keys (optional, per entry): the weekly content-watch
# workflow verifies entries against their pages and bumps last_reviewed
# when unchanged. verify_url points it at a fetchable marketing page when
# the product url is a login wall; `verify: skip` excludes an entry whose
# pages never yield text to a scripted fetch (those stay owner-reviewed).

