  cost: paid
  governance_status: listed
  status_note: Listed for discovery, not endorsement; the policy's data rules apply.
  last_reviewed: 2026-07-21
  blurb: Web platform for managing systematic reviews with a team, covering screening, data extraction, and reporting aligned to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) standard. Artificial intelligence features sort records by predicted relevance, tag randomized controlled trials, and suggest data extraction values that reviewers accept or reject one at a time.

