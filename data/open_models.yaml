# Open-weights model families. Rendered into the "Open-weights models"
# section of docs/tools/index.md at build time by scripts/render_data.py.
# Edit this file only; never the rendered page.
#
# These are model families, not hosted services, so entries carry a license
# instead of a cost and governance badge. Blurbs may name current flagship
# releases; refresh them (and last_reviewed) when a family moves on.
#
# modality: language (default when absent) | image | video | audio | data.
# The section renders one subsection per modality. License names follow the
# Hugging Face model card license tag, verified at authoring.

- name: gpt-oss
  vendor: OpenAI
  url: https://openai.com/index/introducing-gpt-oss/
  license: Apache 2.0
  last_reviewed: 2026-06-10
  blurb: OpenAI's open-weight pair. gpt-oss-120b runs on a single 80 gigabyte graphics card with reasoning performance near the company's o4-mini, and gpt-oss-20b runs on machines with 16 gigabytes of memory.

- name: Llama 4
  vendor: Meta
  url: https://www.llama.com
  license: Llama Community License
  last_reviewed: 2026-06-10
  blurb: Meta's open-weight family and the most widely deployed. Llama 4 Scout and Maverick handle text and images natively, and Scout offers a context window of up to 10 million tokens.

- name: Gemma 4
  vendor: Google
  url: https://deepmind.google/models/gemma/
  license: Apache 2.0
  last_reviewed: 2026-06-10
  blurb: Google's open model family, released April 2026, from 2 billion parameter on-device variants to a 31 billion parameter model, with vision and audio input and support for over 140 languages.

- name: Qwen3
  vendor: Alibaba
  url: https://huggingface.co/Qwen
  license: Apache 2.0
  last_reviewed: 2026-06-10
  blurb: Alibaba's open-weight line, offered in the widest range of sizes, from models small enough for a laptop to flagship scale, with broad multilingual coverage.

- name: DeepSeek
  vendor: DeepSeek
  url: https://huggingface.co/deepseek-ai
  license: MIT
  last_reviewed: 2026-06-10
  blurb: DeepSeek publishes the weights of its flagship chat and reasoning models, including the V4 series, under the permissive MIT license.

- name: Kimi K2
  vendor: Moonshot AI
  url: https://huggingface.co/moonshotai
  license: Modified MIT
  last_reviewed: 2026-06-10
  blurb: Moonshot AI's open-weight family, among the strongest published models on coding and agentic benchmarks as of mid 2026.

- name: Mistral
  vendor: Mistral AI
  url: https://mistral.ai/models
  license: Apache 2.0
  last_reviewed: 2026-06-10
  blurb: French lab Mistral's open-weight range, from the small Ministral models to Mistral Large 3, with most flagship releases under Apache 2.0.

# The next three were added 2026-07-02 via content-watch issue #6 (owner
# approved). Licenses verified from each Hugging Face model card.

- name: GLM 5.2
  vendor: Z.ai (Zhipu AI)
  url: https://huggingface.co/zai-org/GLM-5.2
  license: MIT
  last_reviewed: 2026-07-02
  blurb: The current flagship of the GLM open-weight family behind the Z.ai assistant, a mixture-of-experts model published under the permissive MIT license and supported by local toolchains including llama.cpp.

- name: LongCat 2.0
  vendor: Meituan
  url: https://huggingface.co/meituan-longcat/LongCat-2.0
  license: MIT
  last_reviewed: 2026-07-02
  blurb: A very large open-weight mixture-of-experts model from Chinese company Meituan, 1.6 trillion total parameters with about 48 billion active per token and a 1 million token context window, under MIT.

- name: openPangu 2.0 Flash
  vendor: Huawei
  url: https://huggingface.co/openpangu/openPangu-2.0-Flash
  license: OpenPangu license
  last_reviewed: 2026-07-02
  blurb: Huawei's open-weight mixture-of-experts model, 92 billion total parameters with 6 billion active and a 512k context window, trained on Huawei's own accelerators under a custom license.

# Verified 2026-07-07: license apache-2.0 from the Hugging Face card tag;
# 295B total (298.8B incl. MTP layers per safetensors), 21B active, 256k
# context per the release coverage (simonwillison.net/2026/Jul/6/hy3).
- name: Hy3
  vendor: Tencent
  url: https://huggingface.co/tencent/Hy3
  license: Apache 2.0
  last_reviewed: 2026-07-07
  blurb: A large open-weight mixture-of-experts model from Chinese company Tencent, about 295 billion total parameters with 21 billion active per token and a 256,000 token context window, under Apache 2.0.

# Verified 2026-07-07: license tag "other" resolves to
# tabfm-non-commercial-v1.0 on the Hugging Face card; named verbatim.
- name: TabFM
  vendor: Google Research
  url: https://huggingface.co/google/tabfm-1.0.0-pytorch
  license: TabFM Non-Commercial v1.0
  modality: data
  last_reviewed: 2026-07-07
  blurb: Google Research's open-weight foundation model for tabular data, making zero-shot predictions on spreadsheet-style datasets without task-specific training. Relevant to research data analysis; weights are licensed for non-commercial use.

# --- Image generation (owner approved 2026-06-12) ---------------------------

# License verified 2026-07-15 from the FLUX.2-dev model card tag
# (flux-non-commercial-license). The smaller klein variant's repo is
# gated, so its license is not asserted here.
- name: FLUX.2
  vendor: Black Forest Labs
  url: https://huggingface.co/black-forest-labs/FLUX.2-dev
  license: FLUX Non-Commercial (dev)
  modality: image
  last_reviewed: 2026-07-15
  blurb: The most capable open-weight image family. FLUX.2 dev (32 billion parameters) generates and edits images under a non-commercial license, with a smaller klein variant for lighter hardware. Runs locally in ComfyUI.

- name: Stable Diffusion 3.5
  vendor: Stability AI
  url: https://huggingface.co/stabilityai/stable-diffusion-3.5-large
  license: Community License
  modality: image
  last_reviewed: 2026-06-12
  blurb: The widely supported image generation line with the largest ecosystem of community fine-tunes and tooling. Free for individuals and small organizations under Stability's community license.

- name: Qwen-Image
  vendor: Alibaba
  url: https://huggingface.co/Qwen/Qwen-Image
  license: Apache 2.0
  modality: image
  last_reviewed: 2026-06-12
  blurb: Image generation and editing model under a fully permissive license, notably strong at rendering legible text inside images.

# --- Video generation (owner approved 2026-06-12) ---------------------------

- name: Wan
  vendor: Alibaba
  url: https://huggingface.co/Wan-AI/Wan2.2-T2V-A14B
  license: Apache 2.0
  modality: video
  last_reviewed: 2026-06-12
  blurb: Open-weight video family regarded as the photorealism leader, especially for human subjects. Top quality wants a 24 gigabyte graphics card.

- name: HunyuanVideo
  vendor: Tencent
  url: https://huggingface.co/tencent/HunyuanVideo-1.5
  license: Community License
  modality: video
  last_reviewed: 2026-06-12
  blurb: Tencent's open-weight video model, strongest at natural motion and physics such as fluids, cloth, and object interactions.

# License verified 2026-07-15 from the LTX-2 model card tag
# (ltx-2-community-license-agreement).
- name: LTX-2
  vendor: Lightricks
  url: https://huggingface.co/Lightricks/LTX-2
  license: LTX-2 Community License
  modality: video
  last_reviewed: 2026-07-15
  blurb: Open-weight video family generating synchronized audio and video, free for academic use under its community license. Succeeds the earlier LTX-Video model known for running on modest hardware.

# --- Music and audio (owner approved 2026-06-12) ----------------------------

- name: MusicGen
  vendor: Meta
  url: https://huggingface.co/facebook/musicgen-large
  license: CC BY-NC 4.0
  modality: audio
  last_reviewed: 2026-06-12
  blurb: Meta's research model for generating instrumental music from text descriptions, licensed for non-commercial use.

# License verified 2026-07-15 from the stable-audio-3-medium model card
# tag (stable-audio-community).
- name: Stable Audio 3
  vendor: Stability AI
  url: https://huggingface.co/stabilityai/stable-audio-3-medium
  license: Stable Audio Community
  modality: audio
  last_reviewed: 2026-07-15
  blurb: Generates music, sound effects, and production elements from text, with structured compositions up to several minutes. The small and medium weights are open on Hugging Face; the largest model is not released.

- name: ACE-Step
  vendor: ACE Studio and StepFun
  url: https://huggingface.co/ACE-Step/ACE-Step-v1-3.5B
  license: Apache 2.0
  modality: audio
  last_reviewed: 2026-06-12
  blurb: Open-weight song generation model producing full tracks with vocals across many languages, under a fully permissive license.

# Discovery survey additions (owner-directed open-weights audit,
# 2026-07-15): licenses read verbatim from each Hugging Face model card
# tag the same day.

- name: MiniMax M3
  vendor: MiniMax
  url: https://huggingface.co/MiniMaxAI/MiniMax-M3
  license: MiniMax Community
  last_reviewed: 2026-07-15
  blurb: Large open-weight mixture-of-experts model from the Chinese company MiniMax, with about 428 billion total parameters and 23 billion active per token. Accepts text, image, and video input with a 1 million token context window.

- name: MedGemma
  vendor: Google
  url: https://huggingface.co/google/medgemma-1.5-4b-it
  license: Health AI Developer Foundations
  last_reviewed: 2026-07-15
  blurb: Google's open medical variants of Gemma, trained for medical text and image comprehension across radiology, pathology, dermatology, and medical records. Downloading requires accepting Google's Health AI Developer Foundations terms, which permit research and commercial use.
