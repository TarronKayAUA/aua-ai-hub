name: Weekly content watch

on:
  schedule:
    # Tuesdays. GitHub cron is best-effort; the exact hour doesn't matter
    # for a weekly review pass.
    - cron: "40 12 * * 2"
  workflow_dispatch:
    inputs:
      review_page:
        description: >-
          Force one prose page through review regardless of its due date
          (path relative to docs/, e.g. tools/hardware.md)
        required: false
        default: ""

permissions:
  contents: write
  issues: write
  models: read

concurrency:
  group: content-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Review rosters against the week's news and vendor pages
        id: watch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          EXTRA=""
          if [ -n "${{ inputs.review_page }}" ]; then
            EXTRA="--review-page ${{ inputs.review_page }}"
          fi
          python scripts/content_watch.py --report content-watch.md $EXTRA \
            | tee watch-log.txt
          n=$(grep -oE 'actionable=[0-9]+' watch-log.txt | grep -oE '[0-9]+')
          echo "actionable=$n" >> "$GITHUB_OUTPUT"
      - name: Commit review bumps and auto-applied model adds
        run: |
          # docs/ changes are limited by design to last_reviewed
          # front-matter bumps in enrolled pages (scripts/page_review.py).
          git add data/tools.yaml data/open_models.yaml \
            data/page_review_state.json docs
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(auto): content watch $(date -u +%F)"
            git pull --rebase origin main
            git push
          else
            echo "No changes; skipping commit."
          fi
      - name: Open a recommendations issue when there is something to review
        if: steps.watch.outputs.actionable != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          day=$(date -u +%Y-%m-%d)
          # Assigned to the owner so the Power Automate GitHub connector's
          # "issue assigned to me" trigger can email the AUA inbox
          # (owner request 2026-07-08).
          gh issue create \
            --title "Content watch ${day}: ${{ steps.watch.outputs.actionable }} item(s) to review" \
            --body-file content-watch.md \
            --assignee TarronKayAUA
