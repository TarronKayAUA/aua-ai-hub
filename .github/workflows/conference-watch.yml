name: Conference watch

on:
  schedule:
    # Every second day. GitHub cron is best-effort (delays of hours are
    # normal); precision does not matter here, only cadence, because the
    # stability gate needs two consecutive sightings before it applies
    # anything (feeds.yaml conference_watch block).
    - cron: "13 11 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  models: read

concurrency:
  group: conference-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Check official conference pages
        id: watch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/conference_watch.py --report conference-watch.md \
            | tee watch-log.txt
          n=$(grep -oE 'actionable=[0-9]+' watch-log.txt | grep -oE '[0-9]+')
          echo "actionable=$n" >> "$GITHUB_OUTPUT"
      - name: Commit applied updates and watch state
        run: |
          git add data/conferences.yaml data/conference_watch_state.json
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(conferences): auto-update $(date -u +%F)"
            git pull --rebase origin main
            git push
          else
            echo "No calendar changes; skipping commit."
          fi
      # The site itself rebuilds on the next refresh run (six slots per
      # day), so an applied change reaches the page within a few hours.
      - name: Open a proposal issue when there is something to review
        if: steps.watch.outputs.actionable != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          day=$(date -u +%Y-%m-%d)
          # Assigned to the owner so the Power Automate GitHub connector's
          # "issue assigned to me" trigger can email the AUA inbox.
          gh issue create \
            --title "Conference watch ${day}: ${{ steps.watch.outputs.actionable }} item(s) to review" \
            --body-file conference-watch.md \
            --assignee TarronKayAUA
