name: Nightly news refresh

on:
  schedule:
    # GitHub runs cron best-effort, and observed delays on this repo grew
    # from occasional (9.5 hours late, 2026-06-10) to a consistent 5 to 11
    # hours on every slot (June 2026), so scheduled times cannot be
    # trusted to land anywhere in particular. Six slots every four hours
    # blanket the day instead: whatever the delay, runs land morning,
    # midday, and evening local (UTC-4). Extra runs are cheap and
    # harmless: fresh items are curated exactly once (seen-items ledger),
    # briefs are hash-gated, the digest fires at most once per ISO week,
    # and the workflow commits only when content changed.
    - cron: "20 0,4,8,12,16,20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

# Pushes made with the default GITHUB_TOKEN do not trigger other workflows,
# so this workflow must build and deploy the site itself rather than relying
# on deploy.yml to fire after the pipeline's commit.

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run aggregation pipeline
        env:
          # Exposes the workflow token (models: read) so the pipeline can use
          # GitHub Models inference; without this the run falls back to
          # keyword mode.
          GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/aggregate.py --verbose
      - name: Commit refreshed content
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(news): refresh $(date -u +%F)"
            git push
          else
            echo "No content changes; skipping commit."
          fi
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Same transient-failure retry as deploy.yml: Pages occasionally
      # rejects deployments with "try again later"; two retries on a
      # lengthening backoff absorb it. Content is additionally
      # self-healing here because every one of the six daily slots
      # deploys.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 90
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - if: steps.deployment_retry.outcome == 'failure'
        run: sleep 180
      - id: deployment_final
        if: steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v5
