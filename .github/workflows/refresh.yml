name: Nightly news refresh

on:
  schedule:
    # Two slots because GitHub runs cron best-effort and can delay or drop
    # a slot under load (observed: 9.5 hours late on 2026-06-10). The early
    # slot absorbs delay before morning; the second is the backup if the
    # first is dropped. A double run is harmless: the seen-items ledger
    # dedupes, the digest fires at most once per ISO week, and the workflow
    # only commits when content changed.
    - cron: "45 6 * * *" # 06:45 UTC, 2:45 AM in Antigua (UTC-4 year-round)
    - cron: "15 10 * * *" # 10:15 UTC backup, 6:15 AM in Antigua
  workflow_dispatch:

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

# Pushes made with the default GITHUB_TOKEN do not trigger other workflows,
# so this workflow must build and deploy the site itself rather than relying
# on deploy.yml to fire after the pipeline's commit.

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run aggregation pipeline
        env:
          # Exposes the workflow token (models: read) so the pipeline can use
          # GitHub Models inference; without this the run falls back to
          # keyword mode.
          GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/aggregate.py --verbose
      - name: Commit refreshed content
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(news): refresh $(date -u +%F)"
            git push
          else
            echo "No content changes; skipping commit."
          fi
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
