site_name: AUA AI Hub
site_description: >-
  Curated artificial intelligence reference and news hub for the American
  University of Antigua College of Medicine.
site_url: https://tarronkayaua.github.io/aua-ai-hub/
repo_url: https://github.com/TarronKayAUA/aua-ai-hub
repo_name: TarronKayAUA/aua-ai-hub
copyright: >-
  Maintained by Dr. Tarron Kayalackakom, Assistant Dean for AI in Medical
  Education, AUA College of Medicine &nbsp;|&nbsp;
  <a href="https://forms.office.com/r/5a8RCi2YKP">Feedback</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo-mark-white.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # AUA brand colors sampled from the official logo artwork; the custom
    # primary is defined in docs/stylesheets/extra.css.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/counter.js

plugins:
  - search

hooks:
  - scripts/render_data.py

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - AI Basics:
      - How LLMs Work: basics/how-llms-work.md
      - Glossary: basics/glossary.md
      - Common Misconceptions: basics/misconceptions.md
  - Tools: tools/index.md
  - Prompts:
      - Library: prompts/index.md
      - Community Exchange: prompts/exchange.md
  - Learning: learning/index.md
  - News:
      - This Week: news/this-week.md
      - Medical Education: news/medical-education.md
      - Clinical Practice: news/clinical-practice.md
      - General AI: news/general-ai.md
      - Videos: news/videos.md
      - Podcasts: news/podcasts.md
      - Archive: news/archive/index.md
  - Benchmarks: benchmarks.md
  - Conferences: conferences.md
  - Governance:
      - AI Responsible Use Policy: governance/policy.md
      - Governance Committee: governance/committee.md
  - Announcements:
      - announcements/index.md
  - About: about.md
