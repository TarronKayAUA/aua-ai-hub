site_name: AUA AI Hub
site_description: >-
  Curated artificial intelligence reference and news hub for the American
  University of Antigua College of Medicine.
site_url: https://tarronkayaua.github.io/aua-ai-hub/
repo_url: https://github.com/TarronKayAUA/aua-ai-hub
repo_name: TarronKayAUA/aua-ai-hub
copyright: >-
  Maintained by Dr. Tarron Kayalackakom, Assistant Dean of AI in Medical
  Education, AUA College of Medicine &nbsp;|&nbsp;
  <a href="https://forms.office.com/r/5a8RCi2YKP">Feedback</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo-mark-white.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # AUA brand colors sampled from the official logo artwork; the custom
    # primary is defined in docs/stylesheets/extra.css.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - announce.dismiss

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/counter.js
  - javascripts/hardware.js
  - javascripts/prompts.js
  - javascripts/better-answers.js

plugins:
  - search

hooks:
  - scripts/render_data.py

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Learn:
      - pathway/index.md
      - "1. How AI Works": pathway/how-ai-works.md
      - "2. Prompting Fundamentals": pathway/prompting.md
      - "3. The Rules": pathway/rules.md
      - "4. Teaching and Assessment": pathway/teaching-assessment.md
      - "5. Research and Scholarship": pathway/research.md
      - "6. Clinical Contexts": pathway/clinical.md
      - "7. Working with Agents": pathway/working-with-agents.md
      - Reference:
          - How LLMs Work: basics/how-llms-work.md
          - Getting Better Answers: basics/better-answers.md
          - Glossary: basics/glossary.md
          - Common Misconceptions: basics/misconceptions.md
      - Courses and Resources: learning/index.md
  - Use AI:
      - tools/index.md
      - AI Agents: tools/agents.md
      - Choosing Your Interface: tools/interfaces.md
      - Standing Setups: tools/standing-setups.md
      - Your First Agent Session: tools/first-session.md
      - Running Models Locally: tools/local.md
      - Hardware for Local AI: tools/hardware.md
      - AI for Research: tools/research.md
      - Prompts:
          - prompts/index.md
          - Community Exchange: prompts/exchange.md
      - Playbooks:
          - playbooks/index.md
          - Preparing a Lecture: playbooks/lecture-prep.md
          - Writing Exam Questions: playbooks/exam-items.md
          - Syllabus AI Statement: playbooks/syllabus-statement.md
          - Reviewing the Literature: playbooks/literature-reviews.md
          - Feedback on Student Writing: playbooks/writing-feedback.md
          - Administrative Drafting: playbooks/admin-drafting.md
          - Your Score Reports: playbooks/score-reports.md
  - For Faculty & Staff: faculty.md
  - For Students: students.md
  - News & Events:
      - This Week: news/this-week.md
      - Medical Education: news/medical-education.md
      - Clinical Practice: news/clinical-practice.md
      - General AI: news/general-ai.md
      - Videos: news/videos.md
      - Podcasts: news/podcasts.md
      - Archive: news/archive/index.md
      - Benchmarks:
          - Language Models: benchmarks.md
          - Image Generation: benchmarks/image.md
          - Video Generation: benchmarks/video.md
      - Conferences: conferences.md
      - Opportunities: opportunities.md
  - Governance:
      - AI Responsible Use Policy: governance/policy.md
      - AI Committee: governance/committee.md
      - Committee Updates: governance/updates.md
      - How Tools Are Reviewed: governance/review-process.md
  - About:
      - about.md
      - Announcements: announcements/index.md
