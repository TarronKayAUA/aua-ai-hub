<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07618c"/>
      <stop offset="1" stop-color="#1b4165"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="140" rx="10" fill="url(#bg)"/>
  <!-- ECG trace across the band -->
  <polyline points="80,70 280,70 320,70 340,38 360,102 380,55 400,70 600,70 640,70 660,42 680,98 700,58 720,70 940,70"
            fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85"
            stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="940" cy="70" r="5" fill="#ffffff" opacity="0.9"/>
  <!-- medical cross -->
  <g fill="#ffffff" opacity="0.8">
    <rect x="1040" y="48" width="14" height="44" rx="2"/>
    <rect x="1025" y="63" width="44" height="14" rx="2"/>
  </g>
  <!-- faint grid suggestion -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.12">
    <line x1="80" y1="35" x2="940" y2="35"/>
    <line x1="80" y1="105" x2="940" y2="105"/>
  </g>
</svg>
