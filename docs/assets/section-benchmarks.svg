<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07618c"/>
      <stop offset="1" stop-color="#1b4165"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="140" rx="10" fill="url(#bg)"/>
  <!-- a leaderboard: ranked rows, bars descending in length -->
  <g fill="#ffffff" opacity="0.7" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">
    <text x="150" y="45">1</text>
    <text x="150" y="75">2</text>
    <text x="150" y="105">3</text>
  </g>
  <g fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4">
    <circle cx="150" cy="40" r="11"/>
    <circle cx="150" cy="70" r="11"/>
    <circle cx="150" cy="100" r="11"/>
  </g>
  <g stroke="#ffffff" stroke-width="12" stroke-linecap="round">
    <line x1="185" y1="40" x2="820" y2="40" opacity="0.75"/>
    <line x1="185" y1="70" x2="740" y2="70" opacity="0.55"/>
    <line x1="185" y1="100" x2="620" y2="100" opacity="0.4"/>
  </g>
  <g stroke="#ffffff" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round" opacity="0.5">
    <line x1="870" y1="24" x2="870" y2="116"/>
  </g>
  <g fill="#ffffff" opacity="0.25">
    <circle cx="960" cy="46" r="4"/><circle cx="1000" cy="70" r="4"/><circle cx="960" cy="94" r="4"/>
    <circle cx="1060" cy="46" r="4"/><circle cx="1100" cy="70" r="4"/><circle cx="1060" cy="94" r="4"/>
  </g>
</svg>
