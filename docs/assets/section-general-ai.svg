      <stop offset="0" stop-color="#07618c"/>
      <stop offset="1" stop-color="#1b4165"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="140" rx="10" fill="url(#bg)"/>
  <!-- network graph -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.3">
    <line x1="140" y1="70" x2="260" y2="40"/><line x1="140" y1="70" x2="260" y2="100"/>
    <line x1="260" y1="40" x2="380" y2="70"/><line x1="260" y1="100" x2="380" y2="70"/>
    <line x1="380" y1="70" x2="500" y2="45"/><line x1="380" y1="70" x2="500" y2="95"/>
    <line x1="500" y1="45" x2="620" y2="70"/><line x1="500" y1="95" x2="620" y2="70"/>
    <line x1="620" y1="70" x2="740" y2="40"/><line x1="620" y1="70" x2="740" y2="100"/>
    <line x1="740" y1="40" x2="860" y2="70"/><line x1="740" y1="100" x2="860" y2="70"/>
