# Feed configuration for the news pipeline (scripts/aggregate.py).
#
# Verification rule (SPEC section 7): every URL here was fetched and parsed
# successfully with feedparser before being committed. Run
# `python scripts/verify_feeds.py` after any change to this file.
#
# Optional per-feed key: weight (default 1.0). Multiplies the keyword score in
# keyword curation mode; use values below 1.0 to damp high-volume sources.

defaults:
  lookback_days: 8
  max_items_per_feed: 25
  request_timeout_seconds: 10

# LLM curation settings (SPEC section 9). Provider order: Anthropic when
# ANTHROPIC_API_KEY is set, else GitHub Models when GITHUB_TOKEN is set,
# else keyword mode. Endpoints and model ids verified against official
# documentation 2026-06-09; edit here, never in code.
llm:
  max_candidates: 120
  max_keep: 12
  summary_word_cap: 35
  request_timeout_seconds: 90
  github_models:
    endpoint: https://models.github.ai/inference/chat/completions
    model: openai/gpt-4.1-mini
    api_version: "2026-03-10"
    # GitHub Models free tier rejects requests over 8,000 tokens, so the
    # candidate payload is greedily packed under this character budget
    # (verified limit 2026-06-10).
    max_payload_chars: 22000
  anthropic:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-haiku-4-5
    api_version: "2023-06-01"
    max_payload_chars: 600000
    # Per-candidate truncation for curation payloads. The 140/100
    # defaults were sized for the free tier's 8,000-token cap; the
    # July 3-7 drop-reason audit showed the curator dropping items as
    # "incomplete candidate data" because of them. The Anthropic budget
    # is 75x larger, so candidates travel near-whole here (stored
    # summaries cap at 500 characters). Adds roughly a cent a day.
    candidate_title_chars: 200
    candidate_summary_chars: 400
  # Per-task provider assignments (owner spend plan, 2026-06-11). The
  # Anthropic key activates ONLY the tasks that name anthropic here; each
  # falls back to the free GitHub Models path (then keyword mode) whenever
  # the key is absent or the call fails. Spend is hard-capped at the
  # account level: prepaid credits with auto-reload off, plus a workspace
  # monthly limit. The section briefs stay on the free tier by design
  # (configured in the briefs block below).
  tasks:
    curation:
      provider: anthropic
      model: claude-haiku-4-5
    # Weekly digest selection: picks the week's highlights for the emailed
    # digest, one call per week, so the Sonnet premium costs pennies a
    # month. claude-sonnet-5 pricing re-verified against the live docs
    # 2026-07-02 ($2/$10 per MTok introductory through 2026-08-31, then
    # $3/$15). Owner approved 2026-07-02; curation stays on Haiku pending
    # a week of drop-reason logs.
    digest_selection:
      provider: anthropic
      model: claude-sonnet-5
    conference_watch:
      provider: anthropic
      model: claude-haiku-4-5
    # Weekly content-watch synthesis: judgment call over the week's news
    # against the rosters. claude-sonnet-5 verified against the model docs
    # 2026-07-01 ($3/$15 per MTok list, $2/$10 introductory through
    # 2026-08-31); one call per week.
    content_watch:
      provider: anthropic
      model: claude-sonnet-5
    content_verify:
      provider: anthropic
      model: claude-haiku-4-5
    # Weekly opportunity screen: small candidate list, strict JSON
    # contract, relevance and eligibility filter. Pennies per run.
    opportunity_watch:
      provider: anthropic
      model: claude-haiku-4-5
    # Gate verification for tiered autonomy (owner approved 2026-07-08):
    # structured checklist extraction from fetched official pages before
    # any automatic application. Sonnet for instruction-following
    # fidelity; a handful of small calls per week, well under a dollar
    # a month.
    gate_verify:
      provider: anthropic
      model: claude-sonnet-5
    # Weekly prose page review (owner approved 2026-07-08): claims check
    # of due evergreen pages against fetched tool pages. A wrong drift
    # call costs an owner email, so this rides the same verification
    # tier as gate_verify. A few pages per week, pennies per month.
    page_review:
      provider: anthropic
      model: claude-sonnet-5
    # Weekly digest narrative: owner editorial decision 2026-07-04, made
    # knowing the benchmark picture (LiveBench has Opus 4.8 slightly ahead
    # globally): Fable 5 writes denser short-form prose, and Opus's
    # tendency to expound works against a 320-word ceiling. One call per
    # week, ~13 cents on Fable vs ~6 on Opus. Fable's safety layer can
    # rarely refuse; the fallback re-serves the same call on Opus 4.8
    # in-request (a rescued call bills at Opus rates, so the cost line
    # slightly overstates that week). max_tokens is raised because
    # Fable's always-on thinking shares the output budget.
    digest_narrative:
      provider: anthropic
      model: claude-fable-5
      fallback_model: claude-opus-4-8
      max_tokens: 8000
      # List prices for the cost line in the verification block (USD per
      # million tokens, verified against the live pricing docs 2026-07-04).
      usd_per_m_input: 10
      usd_per_m_output: 50
  # Section briefs: one short narrative per news category page, regenerated
  # only when that page's item set changes. Three small calls at most per
  # night, so they ride the strongest free GitHub Models entry (high tier,
  # ~3 calls fit easily) rather than the bulk-curation mini model. Verified
  # available on the free plan 2026-06-11; the GPT-5 family is gated.
  briefs:
    model: openai/gpt-4.1
    # Forum/community sources stay on the page but are not offered to the
    # brief writer; the brief cites journals, labs, and primary sources.
    exclude_domains:
      - reddit.com
      - news.ycombinator.com
      - hnrss.org

# Category order is meaningful: it sets the section order in the weekly
# digest and mirrors the nav (medical education first, per owner preference).
# Topic vocabularies for the news sub-navigation chips (owner-tunable).
# Derived from a 28-day census of kept items, 2026-07-14: every listed
# topic cleared roughly 8 items over 4 weeks. The curator tags each kept
# news item with one topic from its category's list; tags are
# presentation-only and never affect keep or drop. Unknown or missing
# tags fail soft to Other, which is always available and never listed.
# Rename, merge, or split by editing these lists; changes apply to new
# items from the next pipeline run (existing tags stay as written).
topics:
  general_ai:
    - New models
    - Research and methods
    - Benchmarks and evaluation
    - Safety and reliability
    - Industry and policy
  medical_education:
    - Exams and benchmarks
    - Assessment and feedback
    - Teaching and curriculum
    - Simulation and skills
    - Attitudes and adoption
  clinical_practice:
    - Imaging and diagnostics
    - Clinical decision support
    - Clinical documentation
    - Safety and evaluation
    - Patient facing tools

