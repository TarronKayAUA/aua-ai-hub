# Community Prompt Exchange (GitHub Discussions). The nightly pipeline pulls
# the top-upvoted discussions from this category into the Prompts page.
# category_id is the GraphQL node id; it survives category renames.
community:
  repo: TarronKayAUA/aua-ai-hub
  category_id: DIC_kwDOS17r5c4C-57B
  items: 5            # top-voted rail on the library page
  board_items: 50     # posts mirrored onto the on-site Exchange page
  body_chars: 4000    # per-post body cap; longer posts link out for the rest
  exclude: [2]        # discussion numbers to omit (the welcome/how-to post)

# Committee updates feed: announcement-format Discussions category mirrored
# nightly onto docs/governance/updates.md. Only repo maintainers can post in
# an announcement category, so this is the owner's self-serve publishing
# channel. category_id stays empty until the owner creates the category in
# the Discussions UI (no API exists for category creation); the pipeline
# skips this step cleanly while it is empty.
committee_updates:
  repo: TarronKayAUA/aua-ai-hub
  category_id: ""
  items: 10
  body_chars: 3000

# Conference watch (owner approved 2026-07-01). mode auto applies a changed
# calendar field only when it passes every gate: the model's evidence quote
# appears in the fetched official page, the dates stay coherent, and the
# Weekly opportunity watch (scripts/opportunity_watch.py): sources for
# buildathons, hackathons, and challenges the community may be eligible
# for. Propose-only: keeps become GitHub issues; data/opportunities.yaml
# stays owner-owned. Every source below was fetched and parsed before
# being committed (2026-07-06). Probed and rejected the same day, so
# future sessions do not re-litigate: MLH events (page is script-rendered,
# no parseable markup), PhysioNet news RSS (feed empty), NIH Guide
# funding RSS (near-empty feed and mostly US-institution-limited
# awards), Kaggle competitions (requires an API key; revisit if the
# owner wants to add one). Devpost is filtered to online events because
# in-person hackathons elsewhere rarely fit an Antigua-based community;
# community submissions cover exceptions.
opportunity_watch:
  # auto: keeps hosted on managed platforms (Devpost, grand-challenge)
  # that pass every mechanical gate (current, organizer named, free
  # entry, deadline confirmed from the page) are applied with
  # auto-verified comments; unknown domains and gate failures stay
  # proposals. Set to propose to return everything to proposals.
  mode: auto
  max_candidates: 60
  sources:
    - name: Devpost online hackathons
      kind: devpost
      url: "https://devpost.com/api/hackathons?challenge_type[]=online&status[]=open&status[]=upcoming"
    - name: Grand Challenge medical AI challenges
      kind: grand_challenge
      url: https://grand-challenge.org/api/v1/challenges/

# same value was extracted on stability_runs consecutive runs. Gate failures
# become issue proposals; new conferences are always propose-only. Set mode
# to propose to turn all writing off. Roughly 2 to 3 cents per run on the
# claude-haiku-4-5 task above.
conference_watch:
  mode: auto
  stability_runs: 2
  page_chars: 6000

# Weekly content watch (owner approved 2026-07-01): the week's kept news is
# read against the tools and open-models rosters (one content_watch call),
# and the rotation_size tools entries with the oldest last_reviewed dates
# get their pages fetched and verified (one content_verify call). The only
# automatic write is bumping last_reviewed on verified-unchanged entries;
# every substantive change is proposed in a GitHub issue. Roughly 25 to 50
# cents per month total.
content_watch:
  rotation_size: 12
  news_days: 7
  page_chars: 5000
  # auto: open-weights model adds whose Hugging Face license tag is
  # apache-2.0 or mit are applied with auto-verified comments after the
  # gate_verify model identifies the official repository against the
  # news evidence; any other license tag (including "other", which
  # hides custom terms) stays a proposal for a human license read, as
  # do all tool changes and removals. Set to propose to return
  # everything to proposals.
  models_add_mode: auto
  # Prose page review (owner approved 2026-07-08): evergreen docs pages
  # enrolled via a last_reviewed front-matter key are re-reviewed when
  # their census-derived budget expires:
  #   budget_days = 30 * target_expected_drift / sum(claims * lambda)
  # clamped to [floor_days, cap_days]. The lambda_per_month rates are
  # per-claim drift probabilities per 30 days, cold-started 2026-07-08
  # from one month of observed drift (content-watch proposal rates over
  # the tool directory; the research page needing a substantive rewrite
  # within four weeks of authoring). data/page_review_state.json keeps a
  # drift ledger (claims checked vs drifted) so the rates get
  # re-estimated from observation as reviews accumulate; the costs are
  # asymmetric (an early check costs about a cent, a stale claim sits on
  # an institutional site), so estimates round down.
  page_review:
    # Kill switch: off stops the pass entirely (forced --review-page
    # runs still work, being explicit human requests).
    mode: auto
    max_pages_per_run: 3
    page_chars: 12000
    tool_page_chars: 3000
    max_tool_pages: 4
    target_expected_drift: 0.5
    floor_days: 45
    cap_days: 365
    lambda_per_month:
      model_price: 0.1
      tool_mention: 0.03
      dated_phrase: 0.05

# Weekly digest settings. The digest is a second-stage highlights selection
# over everything kept since the previous digest, generated on the configured
# day's nightly run. Selection instructions live in prompts/digest.md.
digest:
  day: friday
  news_items: 8
  videos: 4
  podcasts: 3
  # Weekly narrative: one cohesive story over the digest highlights, written
  # by the llm.tasks digest_narrative model (the strongest paid model in the
  # owner's spend plan). Grounded in fetched article text, capped per item
  # and in total; pages that block scripted clients fall back to the stored
  # summaries. The narrative is omitted, never downgraded to a weaker model,
  # when the Anthropic path is unavailable or the output fails validation.
  # Writing instructions live in prompts/digest_narrative.md.
  narrative:
    article_chars: 4000
    max_payload_chars: 60000
    min_words: 120
    # Tolerance band, wider than the prompt's stated target on purpose: the
    # W26 narrative was rejected at 273 words against a 260 cap
    # (2026-06-26), discarding a paid draft. The pipeline also makes one
    # corrective retry on any rejected or failed draft.
    max_words: 320
    min_refs: 5

# Benchmarks page data source. The pipeline discovers the current LiveBench
# release from the site's app bundle each night; if discovery or the fetch
# fails, the previously rendered table is kept and the failure is logged.
benchmarks:
  livebench:
    base_url: https://livebench.ai
    # Last resort only: discovery probes the site's own release list and
    # normally never falls back. Bump this when touching the file anyway
    # (a stale pin served a January table for weeks in July 2026 after
    # the site's bundle format changed and old discovery failed quietly).
    fallback_version: "2026_06_25"
    rows: 15

# Curated YouTube channels for the Videos page. Feed URLs derive from
