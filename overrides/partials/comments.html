  comments are stored publicly on the site's GitHub Discussions board.
</p>
<script
  src="https://giscus.app/client.js"
  data-repo="TarronKayAUA/aua-ai-hub"
  data-repo-id="R_kgDOS17r5Q"
  data-category="Announcements"
  data-category-id="DIC_kwDOS17r5c4C-56-"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-emit-metadata="0"
  data-input-position="top"
  data-lang="en"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>
<script>
  /* Keep the giscus theme in step with the site's light/dark palette. */
  (function () {
    function siteTheme() {
      var scheme = document.body.getAttribute("data-md-color-scheme");
      return scheme === "slate" ? "dark" : "light";
    }
    var widget = document.querySelector("script[src='https://giscus.app/client.js']");
    if (widget) {
      widget.setAttribute("data-theme", siteTheme());
    }
    new MutationObserver(function () {
      var frame = document.querySelector("iframe.giscus-frame");
      if (frame) {
        frame.contentWindow.postMessage(
          { giscus: { setConfig: { theme: siteTheme() } } },
          "https://giscus.app"
        );
      }
    }).observe(document.body, {
      attributes: true,
      attributeFilter: ["data-md-color-scheme"],
    });
  })();
</script>
{% endif %}
